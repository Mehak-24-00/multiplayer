<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script type="module">
  import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);

  const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.7));

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(10, 20, 10);
  scene.add(light);

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 40),
    new THREE.MeshLambertMaterial({ color: 0x5d9e4f })
  );
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  const playerMeshes = {};
  const foodMeshes = {};
  let myId = null;
  let spawned = false;

  function getOrCreatePlayer(id, color) {
    if (!playerMeshes[id]) {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(1, 24, 24),
        new THREE.MeshLambertMaterial({ color })
      );
      scene.add(mesh);
      playerMeshes[id] = mesh;
    }
    return playerMeshes[id];
  }

  function getOrCreateFood(id) {
    if (!foodMeshes[id]) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1, 1),
        new THREE.MeshLambertMaterial({ color: 0xff6600 })
      );
      scene.add(mesh);
      foodMeshes[id] = mesh;
    }
    return foodMeshes[id];
  }

  const socket = io();

  socket.on("connect", () => {
    myId = socket.id;
  });

  socket.on("state", (state) => {
    const players = state.players;
    const foods = state.foods;

    for (const [id, p] of Object.entries(players)) {
      const mesh = getOrCreatePlayer(id, p.color);
      mesh.position.set(p.x, p.y, p.z);
      mesh.scale.setScalar(p.radius);

      if (id === myId) {
        spawned = true;
      }
    }

    for (const [id, f] of Object.entries(foods)) {
      const mesh = getOrCreateFood(id);
      mesh.position.set(f.x, f.y, f.z);
      mesh.scale.setScalar(f.size * 2);
    }
  });

  const keys = {};
  document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
  document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

  function movePlayer() {
    if (!myId || !playerMeshes[myId] || !spawned) return;

    const me = playerMeshes[myId].position;
    let moved = false;
    const speed = 0.12;

    if (keys["w"] || keys["arrowup"]) { me.z -= speed; moved = true; }
    if (keys["s"] || keys["arrowdown"]) { me.z += speed; moved = true; }
    if (keys["a"] || keys["arrowleft"]) { me.x -= speed; moved = true; }
    if (keys["d"] || keys["arrowright"]) { me.x += speed; moved = true; }

    if (moved) {
      socket.emit("move", { x: me.x, y: 0.6, z: me.z });
    }
  }

  function followCamera() {
    if (!myId || !playerMeshes[myId]) return;
    const pos = playerMeshes[myId].position;
    camera.position.set(pos.x, pos.y + 8, pos.z + 12);
    camera.lookAt(pos);
  }

  function animate() {
    requestAnimationFrame(animate);
    movePlayer();
    followCamera();
    renderer.render(scene, camera);
  }

  animate();
</script>
